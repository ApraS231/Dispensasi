<body class="bg-background text-on-background min-h-screen font-body-md relative overflow-hidden flex flex-col items-center">
<!-- Dashboard Background Canvas (Simulated) -->
<div class="absolute inset-0 z-0 opacity-50 flex flex-col p-6 gap-6 pt-32">
<div class="w-full max-w-md mx-auto">
<h1 class="font-h1 text-h1 text-on-background mb-8">Dashboard</h1>
<div class="grid gap-6">
<!-- Skeleton Card 1 -->
<div class="skeuo-glass rounded-2xl p-6 h-32 flex items-center justify-between">
<div class="flex flex-col gap-3">
<div class="w-24 h-4 bg-surface-variant rounded-full"></div>
<div class="w-32 h-6 bg-surface-dim rounded-full"></div>
</div>
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-surface-dim" style="font-variation-settings: 'FILL' 1;">widgets</span>
</div>
</div>
<!-- Skeleton Card 2 -->
<div class="skeuo-glass rounded-2xl p-6 h-48 flex flex-col justify-between">
<div class="w-1/3 h-5 bg-surface-variant rounded-full"></div>
<div class="space-y-3">
<div class="w-full h-3 bg-surface-container-high rounded-full"></div>
<div class="w-5/6 h-3 bg-surface-container-high rounded-full"></div>
<div class="w-4/6 h-3 bg-surface-container-high rounded-full"></div>
</div>
</div>
</div>
</div>
</div>

<div class="relative z-50 w-full max-w-md px-4 pt-0 mt-0">
<!-- Banner Container -->
<div class="skeuo-glass-banner p-5 flex items-start gap-4 transform transition-transform duration-500 translate-y-0 relative overflow-hidden">
<!-- Specular Highlight Top Edge -->
<div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white to-transparent opacity-80"></div>
<!-- Icon Column -->
<div class="flex-shrink-0 mt-1">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-inner border border-white/60">
<span class="material-symbols-outlined text-accent-action text-3xl neon-icon-glow" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Text Content Column -->
<div class="flex-1 flex flex-col justify-center">
<h3 class="font-h3 text-h3 text-on-surface mb-1 drop-shadow-sm">Izin Disetujui!</h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    Permintaan izin <span class="font-bold text-on-surface">Budi Santoso</span> telah disetujui oleh Guru Piket.
                </p>
</div>
<!-- Close Action (Subtle) -->
<button class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors" data-icon="close">close</span>
</button>
</div>
