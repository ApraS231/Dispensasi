<body class="bg-surface antialiased overflow-hidden min-h-screen relative font-body-md text-on-surface">
<!-- Background Context (Simulating the app behind the overlay) -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="abstract soft green and white architectural pattern with natural lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAN4m2EdncFdCZIYZF8FNOFNYOqQk4M-gFFNO-hXhGnYQMx28QSj0zOZthquYcAkQf09zu3BabPYlS5eT9FGpN0GfZuKHZu2wj8tlzS65PPcuo56CQg2lAHpfQglLLo8UcQ3f4c7ccwXuSUwg2wO4nbd40PdXRTvojzXZ5JZSJiWloDJwKYXkOFwJPyqcG1xMry7_nzYijVhTrw2sKijM0wCd9E4BClvStpLFyOANwY79RxuKHGhqHLCHk32Sg95qLflDbWPCalso4');">
<div class="absolute inset-0 bg-surface-container-high/80 backdrop-blur-md"></div>
</div>
<!-- Dark Overlay Backdrop -->
<div class="absolute inset-0 z-10 bg-on-background/40 backdrop-blur-[2px]"></div>
<!-- Bottom Sheet Container (Skeuo-Glass Style) -->
<div class="absolute bottom-0 left-0 right-0 z-20 w-full h-[795px] bg-surface-container-lowest/80 backdrop-blur-2xl rounded-t-[32px] shadow-[0_-20px_40px_rgba(0,0,0,0.15)] border-t border-glass-highlight flex flex-col pt-3">
<!-- Drag Handle -->
<div class="w-full flex justify-center mb-4 shrink-0">
<div class="w-12 h-1.5 rounded-full bg-outline-variant/50 shadow-[inset_0_1px_1px_rgba(0,0,0,0.1)]"></div>
</div>
<!-- Header -->
<div class="flex justify-between items-center px-6 pb-4 border-b border-outline-variant/30 shrink-0">
<h2 class="font-h3 text-h3 text-on-surface">Form Pengajuan Izin</h2>
<button class="w-10 h-10 rounded-full bg-surface-container/50 border border-glass-highlight flex items-center justify-center text-on-surface-variant hover:bg-surface-container shadow-sm transition-colors active:shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content Canvas -->
<div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Alert/Info Ticket (Skeuo-Glass Ticket Style) -->
<div class="relative bg-white/40 backdrop-blur-xl border border-glass-border rounded-2xl p-4 shadow-sm overflow-hidden flex items-start gap-4">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white to-transparent"></div>
<div class="w-2 h-2 rounded-full bg-accent-status shadow-[0_0_8px_#EBD350] mt-1 shrink-0"></div>
<div>
<p class="font-body-md text-body-md text-on-surface-variant">Pastikan alasan yang diberikan jelas dan jujur. Pengajuan akan ditinjau oleh Guru Piket yang bertugas.</p>
</div>
</div>
<!-- Form Group: Jenis Izin -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">JENIS IZIN</label>
<!-- Custom Select (Elevasi 1) -->
<div class="relative group cursor-pointer">
<div class="w-full bg-surface-container-lowest/60 border border-outline-variant/60 rounded-xl px-4 py-3 flex items-center justify-between shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] group-hover:bg-surface-container-lowest/80 transition-colors">
<span class="font-body-lg text-body-lg text-on-surface">Pilih jenis izin...</span>
<span class="material-symbols-outlined text-outline">arrow_drop_down</span>
</div>
<!-- Dropdown list would go here logically, styled similarly -->
</div>
</div>
<!-- Form Group: Alasan -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">ALASAN PENGAJUAN</label>
<!-- Auto-growing Textarea (Elevasi 1) -->
<div class="relative">
<textarea class="w-full bg-surface-container-lowest/60 border border-outline-variant/60 rounded-xl px-4 py-3 font-body-lg text-body-lg text-on-surface shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container resize-none transition-shadow" placeholder="Tuliskan alasan secara detail..." rows="4"></textarea>
</div>
</div>
<!-- Form Group: Waktu -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">DARI JAM</label>
<div class="w-full bg-surface-container-lowest/60 border border-outline-variant/60 rounded-xl px-4 py-3 flex items-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-outline mr-2 text-[20px]">schedule</span>
<span class="font-body-lg text-body-lg text-on-surface">08:00</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant tracking-wider">SAMPAI JAM</label>
<div class="w-full bg-surface-container-lowest/60 border border-outline-variant/60 rounded-xl px-4 py-3 flex items-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-outline mr-2 text-[20px]">schedule</span>
<span class="font-body-lg text-body-lg text-outline">--:--</span>
</div>
</div>
</div>
<!-- Form Group: Bukti Foto -->
<div class="space-y-2 pb-6">
<label class="font-label-caps text-label-caps text-on-surface-variant tracking-wider flex justify-between">
<span>LAMPIRAN BUKTI</span>
<span class="text-outline font-normal lowercase">(Opsional)</span>
</label>
<!-- Dashed Upload Area -->
<div class="w-full border-2 border-dashed border-outline-variant/60 rounded-2xl p-8 flex flex-col items-center justify-center bg-surface-container-low/30 hover:bg-surface-container-low/60 transition-colors cursor-pointer group relative overflow-hidden">
<div class="w-14 h-14 rounded-full bg-white/50 backdrop-blur-md shadow-sm border border-glass-border flex items-center justify-center mb-3 group-hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-[28px]">add_a_photo</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Ambil atau Pilih Foto</span>
<span class="font-body-md text-body-md text-outline mt-1 text-[12px]">Maks. 5MB (JPG, PNG)</span>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="px-6 py-4 bg-surface-container-lowest/90 backdrop-blur-3xl border-t border-glass-highlight shrink-0 pb-safe">
<!-- Skeuomorphic Primary Button (Elevasi 3) -->
<button class="w-full relative overflow-hidden bg-primary text-on-primary rounded-xl py-4 font-label-caps text-label-caps tracking-widest shadow-[0_8px_20px_rgba(31,109,0,0.25),inset_0_1px_1px_rgba(255,255,255,0.4)] active:shadow-[inset_0_4px_8px_rgba(0,0,0,0.3)] active:translate-y-1 transition-all duration-200 flex items-center justify-center gap-2">
<span class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/10 to-transparent"></span>
<span>KIRIM PENGAJUAN</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</body></html>
