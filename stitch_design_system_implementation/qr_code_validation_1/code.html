<!-- Main Canvas (Nav suppressed for focused validation state) -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-12 relative z-10">
<!-- Background decorative elements to enhance the physical feel -->
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary-container rounded-full mix-blend-multiply filter blur-[80px] opacity-20"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-secondary-container rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
<!-- Holographic ID Card Container -->
<div class="relative w-full max-w-sm rounded-[32px] p-1.5 bg-gradient-to-br from-surface-container via-surface-container-lowest to-surface-variant backdrop-blur-2xl shadow-[0_20px_50px_-12px_rgba(31,109,0,0.15),inset_0_2px_4px_rgba(255,255,255,0.9)] overflow-hidden">
<!-- Shimmer effect overlay -->
<div class="absolute inset-0 holo-shimmer -rotate-45 scale-150 opacity-60 pointer-events-none"></div>
<!-- Inner White Card Layer -->
<div class="bg-bg-base rounded-[26px] p-8 flex flex-col items-center relative z-10 shadow-sm border border-white/50">
<!-- Status Badge (Physical LED metaphor) -->
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container-low rounded-full border border-glass-border mb-6 shadow-inner">
<div class="w-2.5 h-2.5 rounded-full bg-accent-action shadow-[0_0_8px_#50EB63]"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Izin Aktif</span>
</div>

<div class="absolute top-4 right-4 w-4 h-4 border-t-2 border-r-2 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-4 h-4 border-b-2 border-l-2 border-primary rounded-bl-lg"></div>

</div>
</div>
