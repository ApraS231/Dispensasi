<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom Skeuo-Glass Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top-color: rgba(255, 255, 255, 0.9);
            border-left-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        
        .glass-ticket {
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-bottom-color: rgba(255, 255, 255, 0.3);
            border-right-color: rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.1),
                inset 0 2px 5px rgba(255, 255, 255, 0.8);
        }

        .liquid-donut-container {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #50EB63 0% 75%, #D0EB94 75% 100%);
            box-shadow: 
                0 20px 40px -10px rgba(80, 235, 99, 0.4),
                inset 0 4px 10px rgba(255, 255, 255, 0.8),
                inset 0 -4px 10px rgba(0, 0, 0, 0.1);
        }

        .liquid-donut-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: #f5fceb; /* surface color */
            border-radius: 50%;
            box-shadow: 
                inset 0 10px 20px -5px rgba(0,0,0,0.1),
                0 4px 8px rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .glossy-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 40%);
            pointer-events: none;
        }

        .led-indicator-pending {
            box-shadow: 0 0 10px #EBD350, inset 0 0 4px rgba(255,255,255,0.8);
        }
        .led-indicator-approved {
            box-shadow: 0 0 10px #50EB63, inset 0 0 4px rgba(255,255,255,0.8);
        }
        
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
