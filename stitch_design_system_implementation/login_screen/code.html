<body class="bg-gradient-to-br from-bg-base to-bg-tint min-h-screen w-full flex items-center justify-center p-6 relative overflow-hidden font-body-md text-on-surface">
<!-- Decorative Skeuo-Glass Orbs for Background Depth -->
<div class="absolute -top-32 -left-32 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-[80px] opacity-80 pointer-events-none"></div>
<div class="absolute -bottom-32 -right-32 w-96 h-96 bg-secondary-container rounded-full mix-blend-multiply filter blur-[100px] opacity-40 pointer-events-none"></div>
<!-- Main Login Card (Elevasi 1) -->
<main class="w-full max-w-sm relative z-10 flex flex-col items-center">
<!-- Logo Area with Emboss Effect -->
<div class="mb-12 flex flex-col items-center">
<div class="w-20 h-20 bg-white/40 backdrop-blur-md rounded-2xl shadow-[inset_0_2px_4px_rgba(255,255,255,0.8),0_8px_16px_rgba(0,0,0,0.05)] border border-white/60 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl text-primary drop-shadow-sm" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<h1 class="font-h1 text-[40px] font-black tracking-tighter text-primary [text-shadow:1px_1px_0px_rgba(255,255,255,0.9),-1px_-1px_1px_rgba(0,0,0,0.1)]">SiDispen</h1>
<p class="font-body-md text-body-md text-on-surface-variant/80 mt-2">Sistem Informasi Dispensasi</p>
</div>
<!-- Form Container (Skeuo-Glass Ticket Style) -->
<div class="w-full bg-white/50 backdrop-blur-[24px] border border-glass-border shadow-[0_20px_40px_rgba(0,0,0,0.05),inset_0_1px_0_rgba(255,255,255,0.8)] rounded-[32px] p-8 flex flex-col gap-6 relative">
<!-- White card layer inside -->
<div class="absolute inset-4 bg-white/30 rounded-[20px] pointer-events-none border border-white/40"></div>
<div class="relative z-10 w-full flex flex-col gap-5">
<!-- Email Input (Debossed) -->
<div class="flex flex-col gap-2 w-full">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
<input class="w-full bg-surface-container-highest/40 backdrop-blur-sm border-t border-black/5 border-b border-white/80 border-x-0 rounded-2xl py-4 pl-12 pr-5 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/40 shadow-[inset_0_3px_6px_rgba(0,0,0,0.04),inset_0_1px_2px_rgba(0,0,0,0.03)] focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all" id="email" placeholder="nama@sekolah.edu" type="email"/>
</div>
</div>
<!-- Password Input (Debossed) -->
<div class="flex flex-col gap-2 w-full mb-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
<input class="w-full bg-surface-container-highest/40 backdrop-blur-sm border-t border-black/5 border-b border-white/80 border-x-0 rounded-2xl py-4 pl-12 pr-5 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/40 shadow-[inset_0_3px_6px_rgba(0,0,0,0.04),inset_0_1px_2px_rgba(0,0,0,0.03)] focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button (Elevasi 3 - 3D Physical Look) -->
<button class="w-full mt-2 bg-accent-action text-on-primary-fixed font-h3 text-h3 py-4 rounded-2xl shadow-[0_12px_24px_-4px_rgba(80,235,99,0.4),inset_0_2px_4px_rgba(255,255,255,0.9),inset_0_-4px_8px_rgba(0,100,0,0.15)] active:scale-[0.98] active:shadow-[0_4px_8px_-2px_rgba(80,235,99,0.3),inset_0_4px_8px_rgba(0,100,0,0.2)] transition-all duration-200 border border-white/40 flex justify-center items-center gap-2 cursor-pointer" type="button">
                    Masuk
                    <span class="material-symbols-outlined">login</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="mt-8">
<a class="font-body-md text-body-md text-primary font-semibold hover:underline decoration-primary/50 underline-offset-4 cursor-pointer drop-shadow-sm" href="#">
                Lupa Password?
            </a>
</div>
